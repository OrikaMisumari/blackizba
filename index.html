<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Кодировка страницы -->
  <meta charset="UTF-8">

  <!-- Адаптация под телефон -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Название вкладки -->
  <title>Black Izba</title>

  <!-- Подключаем CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<!-- Запрещаем меню по правому клику -->
<body oncontextmenu="return false;">

  <!-- Главный блок всей страницы -->
  <main class="page">

    <!-- Лого. Это не img, а фоновая картинка через CSS -->
    <div class="logo"></div>

    <!-- Текст между картинками -->
    <section class="text">
      <p>
        Black Izba is a dark folklore clothing brand inspired by Slavic mythology.
      </p>

      <p>
        Forgotten legends, ancient forests, old spirits and creatures from the edge of the woods.
      </p>
    </section>

    <!-- Нижние две картинки. Они тоже будут фоном через CSS -->
    <section class="bottom-images">
      <div class="picture picture-left"></div>
      <div class="picture picture-right"></div>
    </section>

  </main>

</body>
</html>
