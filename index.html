<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Кодировка -->
  <meta charset="UTF-8">

  <!-- Адаптация под телефон -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Название вкладки -->
  <title>Black Izba</title>

  <!-- Подключаем CSS с версией, чтобы браузер не брал старый кэш -->
  <link rel="stylesheet" href="style.css?v=1000">
</head>

<body oncontextmenu="return false;">

  <!-- Вся страница -->
  <main class="page">

    <!-- Верхняя часть: лого + текст -->
    <section class="hero">

      <!-- Лого -->
      <div class="logo"></div>

      <!-- Текст -->
      <div class="message">
        <p class="line line-gold">WEBSITE UNDER CONSTRUCTION</p>
        <p class="line line-logo">FIRST COLLECTION DROPS THIS FALL</p>

        <p class="slogan">
          BORN UNDER THE SUN.<br>
          LOYAL TO THE SHADOWS.
        </p>
      </div>

    </section>

    <!-- Нижние картинки -->
    <section class="arts">
      <div class="art art-left"></div>
      <div class="art art-right"></div>
    </section>

  </main>

</body>
</html>
