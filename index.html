<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Кодировка -->
    <meta charset="UTF-8">

    <!-- Адаптация под телефон -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Название вкладки -->
    <title>Black Izba</title>

    <!-- Подключение CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<!-- Отключаем меню правой кнопки -->
<body oncontextmenu="return false;">

    <!-- Главный контейнер страницы -->
    <main class="page">

        <!-- Логотип сверху -->
        <div class="logo"></div>

        <!-- Текстовый блок -->
        <section class="text">

            <p>
                Black Izba is a dark folklore clothing brand inspired by Slavic mythology.
            </p>

            <p>
                Forgotten legends, ancient forests, old spirits and creatures from the edge of the woods.
            </p>

        </section>

        <!-- Нижний блок с двумя изображениями -->
        <section class="gallery">

            <!-- Левая картинка -->
            <div class="gallery-image left-image"></div>

            <!-- Правая картинка -->
            <div class="gallery-image right-image"></div>

        </section>

    </main>

</body>

</html>
